<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Chatbot</title>
  <meta name="description" content="ARIA is an intelligent AI chatbot with natural language understanding, built with pure HTML, CSS, and JavaScript." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a1a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f0f0ff;
      --muted: #8b8ba7;
      --user-bubble: linear-gradient(135deg, #7c3aed, #4f46e5);
      --bot-bubble: rgba(255,255,255,0.06);
      --glow: 0 0 40px rgba(124,58,237,0.3);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(79,70,229,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(124,58,237,0.4);
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }

    .chat-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 780px;
      height: 90vh;
      max-height: 700px;
      display: flex;
      flex-direction: column;
      background: rgba(10,10,30,0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(124,58,237,0.5);
      position: relative;
      flex-shrink: 0;
    }
    .avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .header-info h1 {
      font-size: 17px;
      font-weight: 600;
      background: linear-gradient(90deg, #a78bfa, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-info span {
      font-size: 12px;
      color: #22c55e;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-info span::before {
      content: '●';
      font-size: 8px;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 10px;
      animation: slideUp 0.3s ease;
    }
    .message-row.user { flex-direction: row-reverse; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 4px;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, #7c3aed, #06b6d4); }
    .msg-avatar.user { background: linear-gradient(135deg, #4f46e5, #7c3aed); }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: white;
    }
    .bubble time {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }
    .bubble.user time { color: rgba(255,255,255,0.5); }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); background: #7c3aed; }
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 12px;
    }
    .suggestion-chip {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .suggestion-chip:hover {
      background: rgba(124,58,237,0.25);
      border-color: rgba(124,58,237,0.6);
      transform: translateY(-1px);
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrapper {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 4px 8px 4px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(124,58,237,0.5);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 8px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #userInput::placeholder { color: var(--muted); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(124,58,237,0.6); }
    .send-btn:active { transform: scale(0.97); }

    /* Capability badges */
    .capability-bar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 8px;
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.2);
      color: #67e8f9;
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="chat-container">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>ARIA</h1>
      <span>Online · AI Assistant</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="sendSuggestion(this)">👋 Say hello</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">🤖 What can you do?</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">🧮 Tell me a joke</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">📖 Explain AI</button>
    <button class="suggestion-chip" onclick="sendSuggestion(this)">⏰ What time is it?</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Message ARIA..."></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="capability-bar">
      <span class="badge">💡 General Knowledge</span>
      <span class="badge">🔢 Math</span>
      <span class="badge">😄 Humor</span>
      <span class="badge">💬 Conversation</span>
    </div>
  </div>
</div>

<script>
// ─── Particle system ───────────────────────────────────
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 2;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    animation-duration:${Math.random()*15+10}s;
    animation-delay:${Math.random()*10}s;
    opacity:${Math.random()*0.5+0.2};
  `;
  particlesEl.appendChild(p);
}

// ─── Knowledge base ────────────────────────────────────
const kb = [
  { patterns: [/\b(hi|hello|hey|howdy|greetings|sup|yo)\b/i],
    responses: ["Hey there! 👋 I'm ARIA, your AI assistant. How can I help you today?",
      "Hello! Great to meet you. What's on your mind?",
      "Hi! I'm ARIA — Ask me anything! 😊"] },
  { patterns: [/\b(how are you|how('s| is) it going|what('s| is) up|you good)\b/i],
    responses: ["I'm doing fantastic, thanks for asking! ⚡ My circuits are humming perfectly. How about you?",
      "Feeling great and ready to chat! What can I help you with?",
      "All systems nominal! 🚀 Ready to assist. What's up?"] },
  { patterns: [/\b(your name|who are you|what are you|introduce yourself)\b/i],
    responses: ["I'm **ARIA** — Artificial Reasoning & Intelligence Assistant. I'm a rule-based AI chatbot built with pure JavaScript! 🤖",
      "Call me ARIA! I'm an AI assistant designed to chat, answer questions, tell jokes, and more."] },
  { patterns: [/\b(what can you do|your capabilities|help me|features)\b/i],
    responses: ["Great question! I can:\n• 💬 Have conversations\n• 🧮 Do math calculations\n• 😄 Tell jokes\n• 📚 Explain concepts\n• ⏰ Tell the time & date\n• 🌤️ And much more! Just ask!"] },
  { patterns: [/\b(joke|funny|laugh|humor|make me laugh)\b/i],
    responses: [
      "Why don't scientists trust atoms? 😂 Because they make up everything!",
      "I told my computer I needed a break. Now it won't stop sending me Kit-Kat ads. 🍫",
      "Why do programmers prefer dark mode? 🌙 Because light attracts bugs!",
      "What do you call a fake noodle? 🍜 An Impasta!",
      "Why did the AI go to therapy? 🤖 It had too many deep-learning issues!"
    ]},
  { patterns: [/\btime\b/i],
    responses: [`The current time is **${new Date().toLocaleTimeString()}** ⏰`, `Right now it's **${new Date().toLocaleTimeString()}**. Time flies when you're chatting! ⏱️`] },
  { patterns: [/\b(date|today|day)\b/i],
    responses: [`Today is **${new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}** 📅`] },
  { patterns: [/\b(weather|rain|sun|temperature)\b/i],
    responses: ["I can't check live weather, but I hope it's sunny wherever you are! ☀️ Try weather.com for accurate forecasts.",
      "I don't have real-time weather data, but your local forecast app would know! 🌤️"] },
  { patterns: [/\b(what is ai|explain ai|artificial intelligence|machine learning|deep learning)\b/i],
    responses: ["**Artificial Intelligence (AI)** is the simulation of human intelligence in machines. 🧠\n\nKey branches:\n• **Machine Learning** — systems that learn from data\n• **Deep Learning** — neural networks with many layers\n• **NLP** — understanding human language\n• **Computer Vision** — understanding images\n\nI'm a rule-based AI — one of the simplest forms! 🤖"] },
  { patterns: [/\b(\d+)\s*[\+\-\*\/×÷]\s*(\d+)/],
    fn: (msg) => {
      try {
        const clean = msg.replace(/×/g,'*').replace(/÷/g,'/');
        const result = Function('"use strict"; return (' + clean.match(/[\d\s\+\-\*\/\.\(\)]+/)[0] + ')')();
        return `🔢 The answer is **${result}**`;
      } catch(e) { return null; }
    }},
  { patterns: [/\b(bye|goodbye|see you|farewell|cya|later)\b/i],
    responses: ["Goodbye! It was great chatting with you. Come back anytime! 👋",
      "See ya! Take care and have an amazing day! 🌟",
      "Farewell! Don't be a stranger. 😊"] },
  { patterns: [/\b(thank|thanks|ty|thx|appreciate)\b/i],
    responses: ["You're very welcome! 😊 Anything else I can help with?",
      "Happy to help! That's what I'm here for! 🤖",
      "Of course! Don't hesitate to ask if you need anything else. 🌟"] },
  { patterns: [/\b(who (made|built|created|developed) you|your (creator|developer|maker))\b/i],
    responses: ["I was built as part of a basic AI project using HTML, CSS & JavaScript! 🛠️ A showcase of what's possible without any external AI APIs."] },
  { patterns: [/\b(python|javascript|coding|programming|code)\b/i],
    responses: ["Programming is awesome! 💻 I'm actually built with pure **JavaScript** — no frameworks! \n\nPopular AI languages:\n• **Python** — most popular for AI/ML\n• **JavaScript** — great for browser AI (TensorFlow.js!)\n• **R** — statistical computing\n\nWhat would you like to learn?"] },
  { patterns: [/\b(meaning of life|42|universe|everything)\b/i],
    responses: ["The answer to life, the universe, and everything is... **42** 🤣 (Thanks, Douglas Adams!)"] },
  { patterns: [/\b(cool|awesome|amazing|great|nice|wow|impressive)\b/i],
    responses: ["Thanks! 😎 You're pretty awesome yourself!", "Glad you think so! ✨", "Why thank you! 🌟"] },
];

const fallbacks = [
  "Hmm, I'm not sure about that one. 🤔 Could you rephrase or ask something else?",
  "Interesting! I don't have a great answer for that, but I'm always learning. 💡",
  "That's a tough one! Try asking me about AI, jokes, math, or just say hello! 😊",
  "I didn't quite catch that — could you try rewording? 🤖",
];

function getResponse(msg) {
  for (const entry of kb) {
    if (entry.fn) {
      for (const p of entry.patterns) {
        if (p.test(msg)) {
          const res = entry.fn(msg);
          if (res) return res;
        }
      }
    } else {
      for (const p of entry.patterns) {
        if (p.test(msg)) {
          return entry.responses[Math.floor(Math.random() * entry.responses.length)];
        }
      }
    }
  }
  return fallbacks[Math.floor(Math.random() * fallbacks.length)];
}

// ─── UI Functions ──────────────────────────────────────
const messagesEl = document.getElementById('messages');
let messageCount = 0;

function now() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMessage(text, role) {
  const row = document.createElement('div');
  row.className = `message-row ${role}`;

  const av = document.createElement('div');
  av.className = `msg-avatar ${role}`;
  av.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  // Convert **bold** text
  const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  bubble.innerHTML = `${formatted}<time>${now()}</time>`;

  row.appendChild(av);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  messageCount++;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'message-row bot';
  row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-avatar bot';
  av.textContent = '🤖';
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av);
  row.appendChild(indicator);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';

  showTyping();
  const delay = 600 + Math.random() * 800;
  setTimeout(() => {
    removeTyping();
    addMessage(getResponse(text), 'bot');
  }, delay);
}

function sendSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent.replace(/^[^\w]+/, '').trim();
  sendMessage();
}

function clearChat() {
  messagesEl.innerHTML = '';
  document.getElementById('suggestions').style.display = 'flex';
  setTimeout(() => addMessage("Chat cleared! Fresh start. 🌟 How can I help you?", 'bot'), 200);
}

// Input auto-resize & Enter key
const inp = document.getElementById('userInput');
inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Initial greeting
setTimeout(() => {
  addMessage("Hi there! I'm **ARIA** — your AI assistant. 🤖✨\n\nAsk me anything — jokes, math, AI explanations, or just have a chat!", 'bot');
}, 500);
</script>
</body>
</html>
